<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watermark Remover | Local Browser-Based Image Cleanup</title>
    <meta
      name="description"
      content="Remove small image overlays locally in your browser with a fast ONNX-powered cleanup workflow. Upload, process, and download without sending files to a server."
    />
    <meta
      name="keywords"
      content="watermark remover, browser image cleanup, local image processing, ONNX image editor, AI image cleanup"
    />
    <meta name="robots" content="index,follow" />
    <meta name="author" content="Watermark Remover" />
    <link rel="canonical" href="https://banana.withus.fun/" />

    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Watermark Remover | Local Browser-Based Image Cleanup"
    />
    <meta
      property="og:description"
      content="Upload an image, process it locally in the browser, and download the result with a private ONNX-powered workflow."
    />
    <meta property="og:url" content="https://banana.withus.fun/" />
    <meta property="og:site_name" content="Watermark Remover" />

    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="Watermark Remover | Local Browser-Based Image Cleanup"
    />
    <meta
      name="twitter:description"
      content="A private browser-based image cleanup tool powered by local ONNX inference."
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Watermark Remover",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Web Browser",
        "description": "A browser-based image cleanup tool that processes images locally with ONNX inference.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Private, browser-only image processing</p>
        <h1>Clean up images locally in your browser.</h1>
        <p class="lede">
          Upload an image, process it with a local ONNX-powered workflow, and
          download the result without sending files to a remote server.
        </p>
      </section>

      <section class="panel">
        <button class="dropzone" data-dropzone type="button">
          <span class="dropzone-title">Drop your image here</span>
          <span>or click to browse</span>
          <span class="dropzone-types">PNG JPG WebP</span>
        </button>

        <input data-file-input type="file" accept="image/png,image/jpeg,image/webp" hidden />

        <div class="controls">
          <label>
            <span>Output Format</span>
            <select data-format>
              <option value="webp">WebP</option>
              <option value="png">PNG</option>
              <option value="jpeg">JPEG</option>
            </select>
          </label>

          <!-- Technical controls hidden from user -->
          <div hidden>
            <input
              data-model-url
              type="url"
              value="https://huggingface.co/Carve/LaMa-ONNX/resolve/main/lama_fp32.onnx"
            />
            <select data-provider>
              <option value="wasm">WASM</option>
            </select>
            <select data-privacy>
              <option value="strip-all">Strip all metadata</option>
            </select>
            <input data-feather type="range" min="0" max="32" step="1" value="15" />
            <input data-quality type="range" min="0.1" max="1" step="0.01" value="0.92" />
          </div>
        </div>

        <div class="actions">
          <button class="primary" data-process type="button">Process Image</button>
          <a class="secondary" data-download hidden>Download Result</a>
          
          <!-- Hidden legacy actions -->
          <button data-load-model type="button" hidden></button>
          <button data-regenerate-mask type="button" hidden></button>
        </div>

        <p class="status" data-status data-state="idle"></p>
        <p class="model-meta" data-model-meta hidden></p>
      </section>

      <section class="preview">
        <div class="preview-card">
          <div class="editor-stage" data-editor-stage>
            <img data-preview-image alt="Selected image preview" />
          </div>
          <p data-preview-meta>No image selected</p>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
